<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Gestion Licenciés</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
  table {
    border-collapse: collapse;
    width: 100%;
  }
  th {
    background-color: #f2f2f2;
  }
  tr:nth-child(even) {
    background-color: #fafafa;
  }
  button {
    padding: 4px 8px;
  }
  </style>
</head>
<body>

<h2>Connexion</h2>

<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Mot de passe">
<button onclick="login()">Se connecter</button>

<hr>

<h2>Liste des licenciés</h2>
<div id="list"></div>

<script>
const SUPABASE_URL = "https://kvazpeplczyjsimxbuyn.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt2YXpwZXBsY3p5anNpbXhidXluIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI0NDYzOTMsImV4cCI6MjA4ODAyMjM5M30.LisaYcfUeKpu1BiCWfsY7gi98uIHNcdpvrZ0BaclNTc";

const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let currentRole = null;

async function login() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { data, error } = await supabaseClient.auth.signInWithPassword({
    email,
    password,
  });

  if (error) {
    alert("Erreur login");
    return;
  }

  loadUserRole(data.user.id);
}

async function loadUserRole(userId) {
  const { data, error } = await supabaseClient
    .from("profiles")
    .select("role")
    .eq("id", userId)
    .single();

  currentRole = data.role;

  loadLicencies();
}

async function loadLicencies() {
  const { data, error } = await supabaseClient
    .from("licencies")
    .select("*")
    .order("last_name", { ascending: true });

  if (error) {
    alert("Erreur chargement");
    console.log(error);
    return;
  }

  const listDiv = document.getElementById("list");

  let table = `
    <table border="1" cellpadding="8" cellspacing="0">
      <tr>
        <th>Prénom</th>
        <th>Nom</th>
        <th>Date de naissance</th>
        <th>Créé le</th>
  `;

  if (currentRole === "admin" || currentRole === "editor") {
    table += `<th>Action</th>`;
  }

  table += `</tr>`;

  data.forEach(licencie => {
    table += `
      <tr>
        <td>${licencie.first_name}</td>
        <td>${licencie.last_name}</td>
        <td>${licencie.birth_date}</td>
        <td>${new Date(licencie.created_at).toLocaleDateString()}</td>
    `;

    if (currentRole === "admin" || currentRole === "editor") {
      table += `
        <td>
          <button onclick="updateBirthDate('${licencie.id}')">
            Modifier
          </button>
        </td>
      `;
    }

    table += `</tr>`;
  });

  table += `</table>`;

  listDiv.innerHTML = table;
}

async function updateBirthDate(id) {
  const newDate = prompt("Nouvelle date (format YYYY-MM-DD) ?");

  const { error } = await supabaseClient
    .from("licencies")
    .update({ birth_date: newDate })
    .eq("id", id);

  if (error) {
    alert("Non autorisé !");
  } else {
    loadLicencies();
  }
}
</script>

</body>
</html>
