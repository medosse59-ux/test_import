<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Formulaire Utilisateur Supabase</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <h1>Ajouter un utilisateur</h1>

  <form id="user-form">
    <input type="text" id="first_name" placeholder="Prénom" required />
    <input type="text" id="last_name" placeholder="Nom" required />
    <input type="date" id="birth_date" required />
    <button type="submit">Ajouter</button>
  </form>

  <h2>Utilisateurs existants</h2>
  <ul id="user-list"></ul>

  <div id="messages" style="color:red; margin-top:1em;"></div>

  <script>
    // 🔹 Remplace ces valeurs par ton projet
    const SUPABASE_URL = "https://kvazpeplczyjsimxbuyn.supabase.co"; // Project URL
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt2YXpwZXBsY3p5anNpbXhidXluIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI0NDYzOTMsImV4cCI6MjA4ODAyMjM5M30.LisaYcfUeKpu1BiCWfsY7gi98uIHNcdpvrZ0BaclNTc";           // Clé anon public

    const supabaseClient  = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const form = document.getElementById("user-form");
    const userList = document.getElementById("user-list");
    const messages = document.getElementById("messages");

    // Fonction pour afficher les utilisateurs
    async function fetchUsers() {
      messages.textContent = "";
      try {
        const { data, error } = await supabaseClient.from("licencies").select("*").order('first_name');
        if (error) throw error;
        userList.innerHTML = "";
        data.forEach(user => {
          const li = document.createElement("li");
          li.textContent = `${user.first_name} ${user.last_name} - ${user.birth_date}`;
          userList.appendChild(li);
        });
      } catch (err) {
        messages.textContent = "Erreur récupération utilisateurs : " + err.message;
      }
    }

    // Test initial pour vérifier URL et clé
    fetchUsers();

    // Gestion du formulaire
    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      messages.textContent = "";

      const first_name = document.getElementById("first_name").value;
      const last_name = document.getElementById("last_name").value;
      const birth_date = document.getElementById("birth_date").value;

      try {
        const { data, error } = await supabaseClient
          .from("licencies")
          .insert([{ first_name, last_name, birth_date }]);

        if (error) throw error;

        alert("Utilisateur ajouté !");
        form.reset();
        fetchUsers(); // Met à jour la liste
      } catch (err) {
        messages.textContent = "Erreur ajout utilisateur : " + err.message;
      }
    });
  </script>
</body>

</html>
