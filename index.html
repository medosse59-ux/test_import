<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Gestion Licenciés</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<h2>Connexion</h2>

<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Mot de passe">
<button onclick="login()">Se connecter</button>

<hr>

<h2>Liste des licenciés</h2>
<div id="userInfo"></div>
<div id="list"></div>

<script>
const SUPABASE_URL = "https://kvazpeplczyjsimxbuyn.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt2YXpwZXBsY3p5anNpbXhidXluIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI0NDYzOTMsImV4cCI6MjA4ODAyMjM5M30.LisaYcfUeKpu1BiCWfsY7gi98uIHNcdpvrZ0BaclNTc";

const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let currentRole = null;

async function login() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { data, error } = await supabaseClient.auth.signInWithPassword({
    email,
    password,
  });

  if (error) {
    alert("Erreur login");
    return;
  }

  loadUserRole(data.user.id);
}

async function loadUserRole(userId) {
  const { data, error } = await supabaseClient
    .from("profile")
    .select("role")
    .eq("id", userId)
    .single();

  currentRole = data.role;

  document.getElementById("userInfo").innerHTML =
    "Rôle connecté : <b>" + currentRole + "</b>";

  loadLicencies();
}

async function loadLicencies() {
  const { data, error } = await supabaseClient
    .from("licencies")
    .select("*")
    .order("last_name", { ascending: true });

  const listDiv = document.getElementById("list");
  listDiv.innerHTML = "";

  data.forEach(licencie => {

    let html = `
      <div style="border:1px solid gray; padding:10px; margin:5px;">
        <b>${licencie.first_name} ${licencie.last_name}</b><br>
        Date de naissance : ${licencie.birth_date}<br>
        Créé le : ${new Date(licencie.created_at).toLocaleDateString()}
    `;

    if (currentRole === "admin" || currentRole === "editor") {
      html += `
        <br><button onclick="updateBirthDate('${licencie.id}')">
          Modifier date de naissance
        </button>
      `;
    }

    html += "</div>";
    listDiv.innerHTML += html;
  });
}

async function updateBirthDate(id) {
  const newDate = prompt("Nouvelle date (format YYYY-MM-DD) ?");

  const { error } = await supabaseClient
    .from("licencies")
    .update({ birth_date: newDate })
    .eq("id", id);

  if (error) {
    alert("Non autorisé !");
  } else {
    loadLicencies();
  }
}
</script>

</body>
</html>
